<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | wrk.money</title>
    <link rel="icon" type="image/png" href="/wrk_files/999circle.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }

        body { background: #000; min-height: 100vh; color: #fff; overflow-x: hidden; }

        #tsparticles { position: fixed; inset: 0; z-index: 0; }

        /* ── 404 layout ── */
        #not-found {
            display: none; position: relative; z-index: 2;
            min-height: 100vh; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #not-found.visible { display: flex; }
        #nf-num { font-size: 8rem; font-weight: 200; letter-spacing: -5px; opacity: 0.15; }
        #nf-msg { font-family: 'Courier New', monospace; font-size: 1.2rem; color: #aaa; margin-top: -20px; margin-bottom: 30px; }
        .back-home {
            padding: 12px 24px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(20,20,20,0.3); color: #fff; text-decoration: none;
            border-radius: 8px; backdrop-filter: blur(4px); transition: all 0.3s;
            font-size: 0.9rem; letter-spacing: 1px;
        }
        .back-home:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }

        /* ── Profile layout (matches /$) ── */
        #enter-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 999; cursor: pointer; transition: opacity 1s ease, visibility 1s;
        }
        #enter-overlay.hidden { opacity: 0; visibility: hidden; }
        .enter-text {
            font-size: 0.7rem; letter-spacing: 5px; color: rgba(255,255,255,0.4);
            text-transform: uppercase; animation: pulse-text 2s infinite;
        }
        @keyframes pulse-text { 0%,100%{opacity:0.3} 50%{opacity:1} }

        #profile-wrap {
            display: none; position: relative; z-index: 1;
            min-height: 100vh; justify-content: center; align-items: center;
            padding: 40px 0; overflow-y: auto;
        }
        #profile-wrap.visible { display: flex; }

        .container {
            text-align: center; width: 100%; max-width: 400px;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            opacity: 0; transform: translateY(10px); transition: all 1.5s ease;
        }
        .container.visible { opacity: 1; transform: translateY(0); }

        header {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 4px; padding: 25px 20px; backdrop-filter: blur(8px);
        }
        .pfp { width: 80px; height: 80px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 1rem; object-fit: cover; }
        .name-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: 4px; text-transform: lowercase; opacity: 0.9; }
        .badge-container { position: relative; display: inline-block; }
        .badge-img { width: 24px; height: 24px; cursor: default; transition: transform 0.3s ease; vertical-align: middle; }
        .badge-img:hover { transform: scale(1.2); }
        .tooltip { visibility: hidden; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 5px 10px; border: 1px solid var(--border); border-radius: 2px; font-size: 0.6rem; white-space: nowrap; z-index: 10; text-transform: lowercase; }
        .badge-container:hover .tooltip { visibility: visible; }
        .typewriter-container { font-size: 0.8rem; color: rgba(255,255,255,0.5); min-height: 1.5em; text-transform: lowercase; margin-top: 10px; }
        #cursor { display: inline-block; width: 8px; height: 1rem; background: #fff; margin-left: 4px; vertical-align: middle; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .section-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.2); margin: 5px 0 10px 5px; text-align: left; }
        .nav-group { display: flex; flex-direction: column; gap: 10px; }
        .hub-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 4px; text-decoration: none; color: var(--text);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1); backdrop-filter: blur(8px);
            text-transform: lowercase; font-size: 0.85rem; letter-spacing: 1px;
            cursor: pointer; width: 100%; outline: none;
        }
        .hub-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.5); transform: translateY(-2px); }
        .console-footer { margin-top: 20px; font-size: 0.65rem; opacity: 0.25; letter-spacing: 4px; width: 100%; text-align: center; }

        /* Audio player */
        .audio-box { background: var(--glass); border: 1px solid var(--border); border-radius: 4px; padding: 15px 20px; backdrop-filter: blur(8px); text-align: left; }
        .audio-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .track-name { font-size: 0.65rem; text-transform: lowercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); }
        .audio-controls { display: flex; align-items: center; gap: 15px; }
        .play-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 0.8rem; opacity: 0.5; transition: opacity 0.3s; font-weight: bold; }
        .play-btn:hover { opacity: 1; }
        .volume-slider { -webkit-appearance: none; width: 50px; height: 1px; background: rgba(255,255,255,0.1); outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
        .progress-container { width: 100%; height: 2px; background: rgba(255,255,255,0.05); cursor: pointer; }
        .progress-bar { height: 100%; background: #fff; width: 0%; }

        #copy-toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            border: 1px solid var(--border); color: #fff;
            padding: 12px 24px; border-radius: 4px; font-size: 0.75rem;
            z-index: 9999; transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            pointer-events: none; letter-spacing: 2px; text-transform: lowercase;
        }
        #copy-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="tsparticles"></div>

<!-- Enter overlay (profile only) -->
<div id="enter-overlay" style="display:none">
    <div class="enter-text">[ click to enter ]</div>
</div>

<!-- 404 content -->
<div id="not-found">
    <h1 id="nf-num">404</h1>
    <p id="nf-msg">> route not found. returning to safety is advised.</p>
    <a href="/" class="back-home">RETURN TO WRK</a>
</div>

<!-- Profile content -->
<div id="profile-wrap">
    <div class="container" id="main-content">
        <header>
            <img id="p-pfp" src="" alt="" class="pfp">
            <div class="name-row">
                <h1 id="p-name"></h1>
                <div id="p-badges"></div>
            </div>
            <div class="typewriter-container">
                <span id="typewriter"></span><span id="cursor"></span>
            </div>
        </header>
        <div id="p-tabs"></div>
        <div class="console-footer" id="p-footer"></div>
    </div>
</div>

<div id="copy-toast">copied</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script>
    const RESERVED = new Set([
        '$','$$','$$$','insanity','startpage','tools','404',
        'p','d','s','login','admin','settings','profile',
        'wrk_files','api','index','favicon','cname','readme',
        'auth','usage','assets',
    ]);

    const pathParts = window.location.pathname.replace(/^\//, '').replace(/\/$/, '').split('/');
    const slug = pathParts[0];
    const isProfileCandidate = slug && slug.length >= 3 && !RESERVED.has(slug) && /^[a-z0-9-]+$/.test(slug);

    // particles loaded by renderProfile() for profiles, or below for 404 pages
    function loadDefaultParticles() {
        tsParticles.load("tsparticles", {
            particles: {
                number: { value: 60, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" }, shape: { type: "circle" },
                opacity: { value: 0.3 }, size: { value: { min: 1, max: 2 } },
                links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.15, width: 1 },
                move: { enable: true, speed: 0.5, outModes: { default: "out" } }
            },
            retina_detect: true
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        });
    }

    function renderProfile(profile) {
        document.title = `${profile.displayName} | wrk.money`;

        document.getElementById('p-pfp').src = profile.avatar;
        document.getElementById('p-pfp').alt = profile.displayName;
        document.getElementById('p-name').textContent = profile.displayName;

        const BADGE_DEFS = {
            admin:     { src: '/wrk_files/badge-admin.svg',     label: 'administrator' },
            early:     { src: '/wrk_files/badge-early.svg',     label: 'early starter' },
            tester:    { src: '/wrk_files/badge-tester.svg',    label: 'tester' },
            developer: { src: '/wrk_files/badge-developer.svg', label: 'developer' },
        };
        const badgesEl = document.getElementById('p-badges');
        (profile.badges || []).forEach(id => {
            const b = BADGE_DEFS[id];
            if (!b) return;
            const div = document.createElement('div');
            div.className = 'badge-container';
            div.innerHTML = `<img src="${escHtml(b.src)}" alt="${escHtml(b.label)}" class="badge-img"><span class="tooltip">${escHtml(b.label)}</span>`;
            badgesEl.appendChild(div);
        });
        document.getElementById('p-footer').textContent = profile.footer || '';

        // Music player
        if (profile.musicEnabled && profile.musicUrl) {
            const audioBox = document.createElement('div');
            audioBox.className = 'audio-box';
            audioBox.id = 'p-audio-box';
            audioBox.innerHTML = `
                <div class="audio-info">
                    <span class="track-name">${escHtml(profile.musicTitle || 'untitled')}</span>
                    <div class="audio-controls">
                        <button class="play-btn" id="p-play-btn">I&gt;</button>
                        <input type="range" class="volume-slider" id="p-volume" min="0" max="1" step="0.01" value="0.25">
                    </div>
                </div>
                <div class="progress-container" id="p-progress-container">
                    <div class="progress-bar" id="p-progress-bar"></div>
                </div>
                <audio id="p-audio" src="${escHtml(profile.musicUrl)}" loop></audio>
            `;
            document.getElementById('p-tabs').before(audioBox);

            const audio = document.getElementById('p-audio');
            const playBtn = document.getElementById('p-play-btn');
            const volume = document.getElementById('p-volume');
            const progressBar = document.getElementById('p-progress-bar');
            const progressContainer = document.getElementById('p-progress-container');

            audio.volume = 0.25;
            playBtn.addEventListener('click', () => {
                if (audio.paused) { audio.play(); playBtn.textContent = '||'; }
                else { audio.pause(); playBtn.textContent = 'I>'; }
            });
            volume.addEventListener('input', e => { audio.volume = e.target.value; });
            audio.addEventListener('timeupdate', () => {
                progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            });
            progressContainer.addEventListener('click', e => {
                audio.currentTime = (e.offsetX / progressContainer.clientWidth) * audio.duration;
            });
        }

        const tabsEl = document.getElementById('p-tabs');
        tabsEl.innerHTML = '';
        (profile.tabs || []).forEach(tab => {
            if (!tab.buttons?.length) return;
            const group = document.createElement('div');
            group.className = 'nav-group';
            group.innerHTML = `<span class="section-label">${escHtml(tab.label)}</span>`;
            tab.buttons.forEach(btn => {
                if (btn.type === 'copy') {
                    const b = document.createElement('button');
                    b.className = 'hub-btn';
                    b.textContent = btn.text;
                    b.addEventListener('click', () => copyToClipboard(btn.value));
                    group.appendChild(b);
                } else {
                    const a = document.createElement('a');
                    a.className = 'hub-btn';
                    a.href = btn.url;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.textContent = btn.text;
                    group.appendChild(a);
                }
            });
            tabsEl.appendChild(group);
        });

        // Typewriter
        const phrases = (profile.bioStatements || []).filter(Boolean);
        if (phrases.length) {
            const target = document.getElementById('typewriter');
            let pIdx = 0, cIdx = 0, isDeleting = false;
            function type() {
                const current = phrases[pIdx];
                target.textContent = isDeleting ? current.substring(0, cIdx--) : current.substring(0, cIdx++);
                if (!isDeleting && cIdx > current.length) { isDeleting = true; setTimeout(type, 2000); }
                else if (isDeleting && cIdx < 0) { isDeleting = false; pIdx = (pIdx + 1) % phrases.length; cIdx = 0; setTimeout(type, 500); }
                else { setTimeout(type, isDeleting ? 40 : 80); }
            }
            setTimeout(type, 800);
        } else {
            document.getElementById('cursor').style.display = 'none';
        }

        // Background
        const networkConfig = {
            particles: {
                number: { value: 80, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" }, shape: { type: "circle" },
                opacity: { value: 0.3 }, size: { value: { min: 1, max: 3 } },
                links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
                move: { enable: true, speed: 1, direction: "none", outModes: { default: "out" } }
            },
            interactivity: {
                events: { onHover: { enable: true, mode: "grab" }, onClick: { enable: true, mode: "push" } },
                modes: { grab: { distance: 140, links: { opacity: 0.5 } }, push: { quantity: 4 } }
            },
            retina_detect: true
        };
        const winterConfig = {
            fpsLimit: 120,
            particles: {
                number: { value: 150, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" }, shape: { type: "circle" },
                opacity: { value: { min: 0.1, max: 0.8 }, animation: { enable: true, speed: 1, sync: false } },
                size: { value: { min: 0.5, max: 3 }, animation: { enable: true, speed: 5, sync: false, startValue: "min" } },
                move: { enable: true, speed: { min: 3, max: 10 }, direction: "top-left", outModes: { default: "out" }, attract: { enable: true, rotate: { x: 600, y: 1200 } } }
            },
            retina_detect: true
        };
        tsParticles.load("tsparticles", profile.background === 'winter' ? winterConfig : networkConfig);

        // Enter overlay
        const overlay = document.getElementById('enter-overlay');
        const content = document.getElementById('main-content');
        overlay.style.display = 'flex';
        document.getElementById('profile-wrap').classList.add('visible');

        overlay.addEventListener('click', () => {
            overlay.classList.add('hidden');
            content.classList.add('visible');
            if (profile.musicEnabled && profile.musicUrl) {
                const audio = document.getElementById('p-audio');
                const playBtn = document.getElementById('p-play-btn');
                if (audio) { audio.play().catch(() => {}); playBtn.textContent = '||'; }
            }
        });

        // Tab title animator
        const displayName = profile.displayName;
        let charIdx = 0, isRev = false;
        function updateTab() {
            document.title = '@' + displayName.substring(0, charIdx);
            if (!isRev) {
                if (charIdx < displayName.length) { charIdx++; setTimeout(updateTab, 300); }
                else { isRev = true; setTimeout(updateTab, 2000); }
            } else {
                if (charIdx > 0) { charIdx--; setTimeout(updateTab, 300); }
                else { isRev = false; setTimeout(updateTab, 500); }
            }
        }
        updateTab();
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function init() {
        if (!isProfileCandidate) {
            document.getElementById('not-found').classList.add('visible');
            loadDefaultParticles();
            return;
        }

        try {
            const res = await fetch(`https://api.wrk.money/profile/${slug}`);
            if (!res.ok) throw new Error('not found');
            const profile = await res.json();
            renderProfile(profile);
        } catch {
            document.getElementById('not-found').classList.add('visible');
            loadDefaultParticles();
        }
    }

    init();
</script>
</body>
</html>
