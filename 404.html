<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 | Lost in the Void</title>
    <link rel="icon" type="image/png" href="/wrk_files/999circle.png">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            font-weight: 200;
            letter-spacing: -5px;
            opacity: 0.15;
        }

        p {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: #aaa;
            margin-top: -20px;
            margin-bottom: 30px;
        }

        .back-home {
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(20, 20, 20, 0.3);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="content">
        <h1>404</h1>
        <p>> Route not found. Returning to safety is advised.</p>
        <a href="/" class="back-home">RETURN TO WRK</a>
    </div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 0.4, "direction": "none", "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" } },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
