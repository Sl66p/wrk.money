<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>set password | wrk.money</title>
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    <style>
        :root { --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body {
            background: #0a0a0a; min-height: 100vh; display: flex;
            justify-content: center; align-items: center; color: #fff;
            position: relative; padding: 20px;
        }
        #tsparticles { position: fixed; inset: 0; z-index: 0; }
        .container { position: relative; z-index: 1; width: 100%; max-width: 360px; }
        h1 { font-size: 2rem; font-weight: 700; letter-spacing: 4px; text-transform: lowercase; opacity: 0.9; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { font-size: 0.65rem; opacity: 0.25; letter-spacing: 2px; text-align: center; margin-bottom: 2rem; }
        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 4px; padding: 28px 24px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.6rem; opacity: 0.3; letter-spacing: 2px; margin-bottom: 8px; }
        .slug-row {
            display: flex; align-items: center;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 4px; overflow: hidden; transition: border-color 0.2s;
        }
        .slug-row:focus-within { border-color: rgba(255,255,255,0.35); }
        .slug-prefix { font-size: 0.75rem; opacity: 0.3; padding: 11px 0 11px 13px; white-space: nowrap; }
        .slug-row input {
            flex: 1; background: transparent; border: none;
            color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; padding: 11px 13px 11px 4px; outline: none;
        }
        input[type="password"] {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 4px; color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; padding: 11px 13px; outline: none; transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: rgba(255,255,255,0.35); }
        input::placeholder { opacity: 0.2; }
        .hint { font-size: 0.58rem; opacity: 0.2; letter-spacing: 1px; margin-top: 5px; }
        button {
            width: 100%; margin-top: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; letter-spacing: 2px; text-transform: lowercase;
            padding: 12px; border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        button:hover:not(:disabled) { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.5); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .error { display: none; font-size: 0.7rem; color: #ff6b6b; margin-top: 12px; letter-spacing: 1px; }
        .error.visible { display: block; }
        .back { display: block; text-align: center; margin-top: 20px; font-size: 0.6rem; opacity: 0.3; letter-spacing: 2px; text-decoration: none; color: #fff; transition: opacity 0.2s; }
        .back:hover { opacity: 0.7; }
        .footer { position: fixed; bottom: 30px; width: 100%; text-align: center; left: 0; z-index: 1; font-size: 0.6rem; opacity: 0.2; letter-spacing: 4px; }
    </style>
</head>
<body>
<div id="tsparticles"></div>
<div class="container">
    <h1>set password</h1>
    <p class="subtitle">claim your wrk.money profile</p>
    <div class="card">
        <div class="field">
            <label>your profile link</label>
            <div class="slug-row">
                <span class="slug-prefix">wrk.money/</span>
                <input type="text" id="slug" placeholder="yourslug" autocomplete="username">
            </div>
        </div>
        <div class="field">
            <label>new password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
            <div class="hint">minimum 8 characters</div>
        </div>
        <div class="field">
            <label>confirm password</label>
            <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button id="submit">set password</button>
        <div class="error" id="error"></div>
    </div>
    <a href="/login" class="back">← back to login</a>
</div>
<div class="footer">WRK.MONEY // SETUP</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script>
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 80, density: { enable: true, area: 800 } },
            color: { value: "#ffffff" }, shape: { type: "circle" },
            opacity: { value: 0.3 }, size: { value: { min: 1, max: 3 } },
            links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1, outModes: { default: "out" } }
        },
        interactivity: { events: { onHover: { enable: true, mode: "grab" } }, modes: { grab: { distance: 140, links: { opacity: 0.5 } } } },
        retina_detect: true
    });

    if (localStorage.getItem('wrk_token')) window.location.href = '/settings';

    // pre-fill slug from URL param e.g. /setup?slug=john
    const params = new URLSearchParams(window.location.search);
    if (params.get('slug')) document.getElementById('slug').value = params.get('slug');

    const slugEl    = document.getElementById('slug');
    const passEl    = document.getElementById('password');
    const confEl    = document.getElementById('confirm');
    const submitBtn = document.getElementById('submit');
    const errorEl   = document.getElementById('error');

    // sanitize slug input live
    slugEl.addEventListener('input', () => {
        slugEl.value = slugEl.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
    });

    async function doSetup() {
        const slug     = slugEl.value.trim();
        const password = passEl.value;
        const confirm  = confEl.value;

        if (!slug || !password) return;
        if (password !== confirm) {
            errorEl.textContent = 'passwords do not match';
            errorEl.classList.add('visible');
            return;
        }
        if (password.length < 8) {
            errorEl.textContent = 'password must be at least 8 characters';
            errorEl.classList.add('visible');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'setting up...';
        errorEl.classList.remove('visible');

        try {
            const res = await fetch('https://api.wrk.money/auth/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug, password }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'setup failed');

            localStorage.setItem('wrk_token', data.token);
            localStorage.setItem('wrk_slug', data.slug);
            window.location.href = '/settings';
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.classList.add('visible');
            submitBtn.disabled = false;
            submitBtn.textContent = 'set password';
        }
    }

    submitBtn.addEventListener('click', doSetup);
    confEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSetup(); });
    passEl.addEventListener('keydown', e => { if (e.key === 'Enter') confEl.focus(); });
    slugEl.addEventListener('keydown', e => { if (e.key === 'Enter') passEl.focus(); });
</script>
</body>
</html>
