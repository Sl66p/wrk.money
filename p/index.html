<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paste | wrk.money</title>
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            color: #ffffff;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 840px;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            font-size: 0.65rem;
            opacity: 0.3;
            letter-spacing: 2px;
            text-decoration: none;
            color: #fff;
            margin-bottom: 32px;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.7; }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .meta-left {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .badge {
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.35;
            text-transform: lowercase;
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .meta-right {
            display: flex;
            gap: 8px;
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        button:hover, a.btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
        }
        a.btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            padding: 7px 16px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .code-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .code-card pre {
            margin: 0;
            overflow-x: auto;
        }

        .code-card pre code {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.8rem;
            line-height: 1.7;
            padding: 24px !important;
            background: transparent !important;
            display: block;
        }

        .hljs { background: transparent !important; }

        .expires {
            font-size: 0.6rem;
            opacity: 0.25;
            letter-spacing: 1px;
            margin-top: 14px;
            text-align: right;
        }

        .loading {
            font-size: 0.75rem;
            opacity: 0.3;
            letter-spacing: 2px;
            padding: 60px 0;
            text-align: center;
        }

        .error-state {
            display: none;
            text-align: center;
            padding: 60px 0;
        }
        .error-state.visible { display: block; }
        .error-state h2 {
            font-size: 1rem;
            opacity: 0.5;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .console-footer {
            position: fixed;
            bottom: 30px;
            font-size: 0.6rem;
            opacity: 0.2;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

<div id="tsparticles"></div>

<div class="container">
    <a href="/tools/pastebin" class="back-link">← new paste</a>

    <div id="loading" class="loading">loading...</div>

    <div id="error-state" class="error-state">
        <h2>paste not found or expired</h2>
        <a href="/tools/pastebin" class="btn">create a new paste</a>
    </div>

    <div id="paste-view" style="display:none">
        <div class="meta-row">
            <div class="meta-left">
                <span class="badge" id="lang-badge">plaintext</span>
            </div>
            <div class="meta-right">
                <button id="copy-btn">copy</button>
                <a href="/tools/pastebin" class="btn">new paste</a>
            </div>
        </div>
        <div class="code-card">
            <pre><code id="code-block"></code></pre>
        </div>
        <div class="expires" id="expires-label"></div>
    </div>
</div>

<div class="console-footer">PASTE.VIEW // WRK_02</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 80, density: { enable: true, area: 800 } },
            color: { value: "#ffffff" },
            shape: { type: "circle" },
            opacity: { value: 0.3 },
            size: { value: { min: 1, max: 3 } },
            links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1, direction: "none", outModes: { default: "out" } }
        },
        interactivity: {
            events: { onHover: { enable: true, mode: "grab" }, onClick: { enable: true, mode: "push" } },
            modes: { grab: { distance: 140, links: { opacity: 0.5 } }, push: { quantity: 4 } }
        },
        retina_detect: true
    });

    const id = new URLSearchParams(window.location.search).get('id');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error-state');
    const pasteView = document.getElementById('paste-view');
    const codeBlock = document.getElementById('code-block');
    const langBadge = document.getElementById('lang-badge');
    const expiresLabel = document.getElementById('expires-label');
    const copyBtn = document.getElementById('copy-btn');

    async function loadPaste() {
        if (!id) {
            loadingEl.style.display = 'none';
            errorEl.classList.add('visible');
            return;
        }

        try {
            const res = await fetch(`https://api.wrk.money/p/${id}`);
            if (!res.ok) throw new Error();

            const data = await res.json();

            codeBlock.textContent = data.content;
            langBadge.textContent = data.lang || 'plaintext';

            const langMap = { 'c++': 'cpp', 'plaintext': 'plaintext' };
            const lang = langMap[data.lang] || data.lang || 'plaintext';
            if (lang !== 'plaintext') {
                codeBlock.className = `language-${lang}`;
                hljs.highlightElement(codeBlock);
            }

            if (data.expiresAt) {
                const exp = new Date(data.expiresAt);
                expiresLabel.textContent = `expires ${exp.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
            }

            document.title = `paste ${id} | wrk.money`;
            loadingEl.style.display = 'none';
            pasteView.style.display = 'block';
        } catch {
            loadingEl.style.display = 'none';
            errorEl.classList.add('visible');
        }
    }

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(codeBlock.textContent).then(() => {
            copyBtn.textContent = 'copied!';
            setTimeout(() => copyBtn.textContent = 'copy', 2000);
        });
    });

    loadPaste();
</script>
</body>
</html>
