    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: #0a0a0a; color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden; display: flex;
            flex-direction: column; align-items: center;
        }

        #particles-js { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }

        #content {
            position: relative; z-index: 2; display: flex;
            flex-direction: column; align-items: center;
            width: 100%; height: 100%; pointer-events: none;
        }

        #clock {
            font-size: 2.5rem; font-weight: 300; margin-top: 5vh;
            letter-spacing: 3px; opacity: 0.8; pointer-events: auto;
        }

        .search-container {
            margin-top: 20vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; pointer-events: auto;
        }

        #typewriter-container {
            font-size: clamp(0.8rem, 2.5vw, 1.1rem); height: 1.5rem;
            margin-bottom: 15px; color: #aaa;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px; white-space: nowrap;
            text-align: center; display: block;
            width: 100vw; max-width: 1000px;
        }

        form { width: 100%; max-width: 550px; position: relative; }

        input[type="text"] {
            width: 100%; padding: 16px 28px; font-size: 1.1rem;
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(20, 20, 20, 0.3); backdrop-filter: blur(4px);
            color: white; outline: none; transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background-color: rgba(30, 30, 30, 0.5);
        }

        /* Suggestions Engine Styles */
        #suggestions {
            position: absolute; top: 110%; left: 0; width: 100%;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(12px);
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; display: none; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .suggestion-item {
            padding: 14px 24px; color: #aaa; cursor: pointer;
            transition: all 0.2s; text-align: left;
            font-size: 1rem;
        }

        .suggestion-item:hover, .suggestion-item.selected {
            background: rgba(255, 255, 255, 0.1); color: #fff;
            padding-left: 30px;
        }

        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: auto; }
        .footer-link { color: #888 !important; text-decoration: none; letter-spacing: 1px; font-size: 0.9rem; opacity: 0.5; transition: all 0.3s ease; cursor: pointer; }
        .footer-link:hover { opacity: 1; color: #ffffff !important; text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }

        /* Command Shortcuts UI */
        #shortcuts-toggle {
            position: fixed; bottom: 20px; right: 20px;
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(20,20,20,0.5); backdrop-filter: blur(5px);
            color: #888; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; transition: 0.3s; pointer-events: auto;
            font-weight: bold;
        }
        #shortcuts-toggle:hover { color: #fff; border-color: #fff; }

        #shortcuts-menu {
            position: fixed; bottom: 65px; right: 20px;
            width: 240px; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 20px; z-index: 99;
            transform: translateY(20px); opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #shortcuts-menu.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
        #shortcuts-menu h3 { margin: 0 0 15px 0; font-size: 0.8rem; letter-spacing: 2px; color: #fff; opacity: 0.6; text-transform: uppercase; }
        #shortcuts-menu ul { list-style: none; padding: 0; margin: 0; }
        #shortcuts-menu li { margin-bottom: 10px; font-size: 0.85rem; color: #bbb; display: flex; align-items: center; }
        #shortcuts-menu span { color: #fff; font-family: 'Courier New', monospace; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; margin-right: 12px; min-width: 30px; text-align: center; }
        
        form button { display: none; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="content">
        <div id="date" style="font-size: 1rem; letter-spacing: 5px; opacity: 0.5; margin-top: 5vh; margin-bottom: -10px; font-weight: 300; pointer-events: auto;">
        MONTH 00, 0000
        </div>
        <div id="clock">00:00:00 AM</div>

        <div class="search-container">
            <div id="typewriter-container"><span id="typewriter"></span></div>
            <form id="search-form" action="https://www.startpage.com/do/search" method="GET">
                <input type="text" id="search-input" name="query" placeholder="Search Startpage..." autofocus autocomplete="off">
                <div id="suggestions"></div>
            </form>
        </div>

        <div id="shortcuts-toggle" onclick="toggleShortcuts()">?</div>
        <div id="shortcuts-menu">
            <h3>Quick Commands</h3>
            <ul>
                <li><span>?y</span> YouTube</li>
                <li><span>?x</span> X</li>
                <li><span>?gh</span> GitHub</li>
                <li><span>?s</span> SpaceMail</li>
                <li><span>?g</span> Gmail</li>
                <li><span>?c</span> Coinbase</li>
                <li><span>?r</span> Reddit</li>
                <li><span>?ai</span> Claude</li>
            </ul>
        </div>

        <footer>
            <a href="https://wrk.money" target="_blank" class="footer-link">999 wrld.</a>
        </footer>
    </div>

    <script>
        // Clock Logic
    function updateClock() {
        const now = new Date();
    
        // Date Logic
        const options = { month: 'long', day: 'numeric', year: 'numeric' };
        const dateString = now.toLocaleDateString('en-US', options).toUpperCase();
        document.getElementById('date').textContent = dateString;

        // Existing Clock Logic
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        const ampm = hours >= 12 ? 'PM' : 'AM';

        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        seconds = seconds < 10 ? '0' + seconds : seconds;

        const timeString = `${hours}:${minutes}:${seconds} ${ampm}`;
        document.getElementById('clock').textContent = timeString;
    }
        setInterval(updateClock, 1000);
        updateClock();

        // Typewriter Logic
        const introPhrases = [
            "Ogkush's Start Page.",
            "Clutter Free, No Ads EVER, and Free to Use.",
            "This site uses ZERO trackers and is open source."
        ];
        const randomPhrases = [
            "All the info is out there, you just need to find it!",
            "Bored? Check out FMHY!",
            "Stay caffeinated, stay up.",
            "Keep the terminal transparent.",
            "999 wrld.",
            "Everyday is a good day, you just need to find the good within it.",
            "Don't have a good day... Have a great day!",
            "'Waste no more time wondering what a good man should be. Be one.' -Marcus Aurelius",
            "In relentless pursuit.",
            "Google is shit anyways, that's why you're here!",
            "We use startpage cause it give better results without AI!",
            "Simplicity is the ultimate sophistication.",
            "Optimized for search speed, designed for your focus.",
            "Control the controllable; ignore the rest.",
            "Privacy is YOUR RIGHT, don't let them trick you.",
            "Execution over excuses.",
            "Project made with much love by ogkush, in affiliation with wrk.money <3."
        ];

        let charIndex = 0, isDeleting = false, isIntroFinished = false, currentPhraseIndex = 0, lastRandomIndex = -1;
        const typewriterElement = document.getElementById('typewriter');

        function type() {
            let currentPhrase = !isIntroFinished ? introPhrases[currentPhraseIndex] : randomPhrases[currentPhraseIndex];
            typewriterElement.textContent = currentPhrase.substring(0, isDeleting ? charIndex - 1 : charIndex + 1);
            charIndex = isDeleting ? charIndex - 1 : charIndex + 1;
            let typeSpeed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentPhrase.length) { typeSpeed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                if (!isIntroFinished) {
                    currentPhraseIndex++;
                    if (currentPhraseIndex >= introPhrases.length) { isIntroFinished = true; currentPhraseIndex = Math.floor(Math.random() * randomPhrases.length); }
                } else {
                    let nextIndex;
                    do { nextIndex = Math.floor(Math.random() * randomPhrases.length); } while (nextIndex === lastRandomIndex);
                    currentPhraseIndex = nextIndex; lastRandomIndex = nextIndex;
                }
                typeSpeed = 500;
            }
            setTimeout(type, typeSpeed);
        }
        type();

        // Search Shortcuts & Redirects
        const shortcutMap = {
            '?y': 'https://www.youtube.com',
            '?x': 'https://x.com',
            '?gh': 'https://github.com',
            '?s': 'https://spacemail.com',
            '?g': 'https://mail.google.com',
            '?c': 'https://www.coinbase.com',
            '?r': 'https://www.reddit.com',
            '?ai': 'https://claude.ai'
        };

        const searchForm = document.getElementById('search-form');
        const input = document.getElementById('search-input');
        const suggBox = document.getElementById('suggestions');
        let selectedIndex = -1;

        searchForm.addEventListener('submit', function(e) {
            const query = input.value.trim().toLowerCase();
            if (query.startsWith('?')) {
                if (shortcutMap[query]) {
                    e.preventDefault();
                    window.location.href = shortcutMap[query];
                }
            }
        });

        // Toggle Shortcuts UI
        function toggleShortcuts() {
            document.getElementById('shortcuts-menu').classList.toggle('active');
        }

        // Keyboard Listener (Press '/' for shortcuts)
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== input) {
                e.preventDefault();
                toggleShortcuts();
            }
        });

        // Autosuggestions Engine
        input.addEventListener('input', () => {
            const q = input.value;
            if (q.length < 2 || q.startsWith('?')) { suggBox.style.display = 'none'; return; }
            const script = document.createElement('script');
            script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=showSuggestions`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        });

        window.showSuggestions = (data) => {
            const results = data[1].slice(0, 4); 
            if (results.length === 0) { suggBox.style.display = 'none'; return; }
            suggBox.innerHTML = results.map(s => `<div class="suggestion-item">${s}</div>`).join('');
            suggBox.style.display = 'block';
            selectedIndex = -1;
            document.querySelectorAll('.suggestion-item').forEach((item) => {
                item.addEventListener('click', () => {
                    input.value = item.textContent;
                    searchForm.submit();
                });
            });
        };

        input.addEventListener('keydown', (e) => {
            const items = document.querySelectorAll('.suggestion-item');
            if (e.key === 'ArrowDown') {
                selectedIndex = (selectedIndex + 1) % items.length;
                updateSelection(items);
            } else if (e.key === 'ArrowUp') {
                selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                updateSelection(items);
            } else if (e.key === 'Enter' && selectedIndex > -1) {
                e.preventDefault();
                input.value = items[selectedIndex].textContent;
                searchForm.submit();
            }
        });

        function updateSelection(items) {
            items.forEach((item, i) => item.classList.toggle('selected', i === selectedIndex));
        }

        document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) suggBox.style.display = 'none'; });

        // Particles Configuration
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 0.6, "out_mode": "out" }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
