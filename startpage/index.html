<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ogkush's Start Page</title>
    <link rel="icon" type="image/png" href="../wrk_files/999circle.png">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #clock {
            font-size: 2.5rem;
            font-weight: 300;
            margin-top: 5vh;
            letter-spacing: 3px;
            opacity: 0.8;
            pointer-events: auto;
        }

        .search-container {
            margin-top: 20vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; 
            pointer-events: auto;
        }

        #typewriter-container {
            font-size: clamp(0.8rem, 2.5vw, 1.1rem);
            height: 1.5rem;
            margin-bottom: 15px;
            color: #aaa;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
            white-space: nowrap;
            text-align: center;
            display: block;
            width: 100vw; 
            max-width: 1000px;
        }

        form {
            width: 100%;
            max-width: 550px;
            display: flex;
            justify-content: center;
        }

        input[type="text"] {
            width: 90%;
            padding: 16px 28px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(20, 20, 20, 0.3); 
            backdrop-filter: blur(4px);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background-color: rgba(30, 30, 30, 0.5);
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10; /* Bring it to the very front */
            pointer-events: auto; /* Explicitly allow clicking */
        }

        .footer-link {
            color: #888 !important; /* !important forces it to ignore the default blue */
            text-decoration: none;
            letter-spacing: 1px;
            font-size: 0.9rem;
            opacity: 0.5;
            transition: all 0.3s ease;
            display: inline-block; /* Makes the hit-box more reliable */
            cursor: pointer;
        }

        .footer-link:hover {
            opacity: 1;
            color: #ffffff !important;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .footer-text { color: #888; letter-spacing: 1px; }
        form button { display: none; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="content">
        <div id="clock">00:00:00 AM</div>

        <div class="search-container">
            <div id="typewriter-container"><span id="typewriter"></span></div>
            <form action="https://www.startpage.com/do/search" method="GET">
                <input type="text" name="query" placeholder="Search Startpage..." autofocus autocomplete="off">
            </form>
        </div>

        <footer>
            <a href="https://wrk.money" target="_blank" class="footer-link">999 wrld.</a>
        </footer>
    </div>

    <script>
        // Clock Logic
        function updateClock() {
            const now = new Date();
            const estString = now.toLocaleTimeString('en-US', {
                timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            document.getElementById('clock').textContent = estString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // New Two-Stage Typewriter Logic
        const introPhrases = [
            "Ogkush's Start Page.",
            "Clutter Free, No Ads EVER, and Free to Use.",
            "This site uses ZERO trackers and is open source.",
        ];

        const randomPhrases = [
            "All the info is out there, you just need to find it!",
            "Bored? Check out FMHY!",
            "Sometimes it's nice to go outside and smell the flowers.",
            "Stay caffeinated, stay up.",
            "Keep the terminal transparent.",
            "999 wrld.",
            "Everyday is a good day, you just need to find the good within it.",
            "Don't have a good day... Have a great day!",
            "'Waste no more time wondering what a good man should be. Be one.' -Marcus Aurelius",
            "In relentless pursuit.",
            "Google is shit anyways, that's why you're here!",
            "We use startpage cause it give better results without AI!",
            "Simplicity is an ultimate sophistication.",
            "Optimized for search speed, designed for your focus.",
            "Control the controllable; ignore the rest.",
            "Privacy is YOUR RIGHT, don't let them trick you into thinking otherwise.",
            "Execution over excuses.",
            "Project made with much love by ogkush, in affiliation with wrk.money <3."
        ];

        let charIndex = 0;
        let isDeleting = false;
        let isIntroFinished = false;
        let currentPhraseIndex = 0;
        let lastRandomIndex = -1;
        const typewriterElement = document.getElementById('typewriter');

        function type() {
            let currentPhrase = !isIntroFinished 
                ? introPhrases[currentPhraseIndex] 
                : randomPhrases[currentPhraseIndex];
            
            if (isDeleting) {
                typewriterElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                
                if (!isIntroFinished) {
                    currentPhraseIndex++;
                    if (currentPhraseIndex >= introPhrases.length) {
                        isIntroFinished = true;
                        currentPhraseIndex = Math.floor(Math.random() * randomPhrases.length);
                        lastRandomIndex = currentPhraseIndex;
                    }
                } else {
                    let nextIndex;
                    do {
                        nextIndex = Math.floor(Math.random() * randomPhrases.length);
                    } while (nextIndex === lastRandomIndex);
                    currentPhraseIndex = nextIndex;
                    lastRandomIndex = nextIndex;
                }
                typeSpeed = 500;
            }
            setTimeout(type, typeSpeed);
        }
        type();

        // Particles Configuration
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 0.6, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
