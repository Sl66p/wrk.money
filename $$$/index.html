<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pulse | wrk.money</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    
    <style>
        :root {
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { margin-bottom: 10px; }

        .pfp {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            object-fit: cover;
        }

        .name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.9;
        }

        /* Badge Logic */
        .badge-container {
            position: relative;
            display: inline-block;
        }

        .badge-img {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .badge-img:hover { transform: scale(1.2); }

        .tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 2px;
            font-size: 0.6rem;
            white-space: nowrap;
            z-index: 10;
            text-transform: lowercase;
        }

        .badge-container:hover .tooltip { visibility: visible; }

        .typewriter-container {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            min-height: 1.5em;
            text-transform: lowercase;
        }

        /* Group Containers */
        .section-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 10px;
            text-align: left;
            padding-left: 5px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            text-transform: lowercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .hub-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .console-footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            opacity: 0.25;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
        }

        #cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background: #fff;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div class="container">
        <header>
            <img src="/wrk_files/pulsepfp.png" alt="pulse" class="pfp">
            <div class="name-row">
                <h1>pulse</h1>
                <div class="badge-container">
                    <a href="https://t.me/nft/CupidCharm-22005">
                        <img src="/wrk_files/cupid_charm.png" alt="Cupid Charm" class="badge-img">
                    </a>
                    <span class="tooltip">Cupid Charm #22005</span>
                </div>
            </div>
            <div class="typewriter-container">
                <span id="typewriter"></span><span id="cursor"></span>
            </div>
        </header>

        <div class="nav-group">
            <span class="section-label">socials</span>
            <a href="https://t.me/upevil" class="hub-btn">telegram</a>
            <a href="https://tiktok.com/@fsu_pulse" class="hub-btn">tiktok</a>
        </div>

        <div class="nav-group">
            <span class="section-label">payments</span>
            <a href="https://cash.app/$FSUpulse" class="hub-btn">cashapp</a>
        </div>
    </div>

    <div class="console-footer">
        ogkush was here!
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
    
    <script>
        const phrases = ["trying to live in gods image.", "i wanna change the world.", "9994l"];
        let pIdx = 0, cIdx = 0, isDeleting = false;
        const target = document.getElementById('typewriter');

        function type() {
            const current = phrases[pIdx];
            target.textContent = isDeleting ? current.substring(0, cIdx--) : current.substring(0, cIdx++);
            
            if (!isDeleting && cIdx > current.length) {
                isDeleting = true;
                setTimeout(type, 2000);
            } else if (isDeleting && cIdx < 0) {
                isDeleting = false;
                pIdx = (pIdx + 1) % phrases.length;
                cIdx = 0;
                setTimeout(type, 500);
            } else {
                setTimeout(type, isDeleting ? 40 : 80);
            }
        }

        tsParticles.load("tsparticles", {
            particles: {
                number: { value: 80, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" },
                opacity: { value: 0.3 },
                size: { value: { min: 1, max: 3 } },
                links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
                move: { enable: true, speed: 1, direction: "none", outModes: { default: "out" } }
            },
            interactivity: {
                events: { onHover: { enable: true, mode: "grab" } },
                modes: { grab: { distance: 140, links: { opacity: 0.5 } } }
            }
        });

        document.addEventListener("DOMContentLoaded", () => setTimeout(type, 1000));
    </script>
</body>
</html>
