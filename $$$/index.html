        #enter-overlay {

        #tsparticles {

        .container {

        .badge-container:hover .tooltip { visibility: visible; }

        .typewriter-container {
            font-size: 0.8rem;

        .audio-box {

        .audio-info {

            justify-content: space-between;
            align-items: center;

        .audio-controls {

        .volume-slider {

        .progress-container {

<body>

    <div id="enter-overlay">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
    
    <script>
        const audio = document.getElementById('audio');
        const overlay = document.getElementById('enter-overlay');
        const content = document.getElementById('main-content');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');

        audio.volume = 0.25;

        overlay.addEventListener('click', () => {
            overlay.classList.add('hidden');
            content.classList.add('visible');
            audio.play();
            playBtn.textContent = '||';
            setTimeout(type, 1000);
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); playBtn.textContent = '||'; }
            else { audio.pause(); playBtn.textContent = '|>'; }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${percent}%`;
        });

        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        });

        const phrases = ["trying to live in gods image.", "i wanna change the world.", "9994l"];
        let pIdx = 0, cIdx = 0, isDeleting = false;
        const target = document.getElementById('typewriter');

        function type() {
            const current = phrases[pIdx];
            target.textContent = isDeleting ? current.substring(0, cIdx--) : current.substring(0, cIdx++);
            if (!isDeleting && cIdx > current.length) { isDeleting = true; setTimeout(type, 2000); }
            else if (isDeleting && cIdx < 0) { isDeleting = false; pIdx = (pIdx + 1) % phrases.length; cIdx = 0; setTimeout(type, 500); }
            else { setTimeout(type, isDeleting ? 40 : 80); }
        }

        // Warp Speed Logic
        tsParticles.load("tsparticles", {
            fpsLimit: 120,
            particles: {
                number: { value: 150, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: {
                    value: { min: 0.1, max: 0.8 },
                    animation: { enable: true, speed: 1, sync: false }
                },
                size: {
                    value: { min: 0.5, max: 3 },
                    animation: { enable: true, speed: 5, sync: false, startValue: "min" }
                },
                move: {
                    enable: true,
                    speed: { min: 3, max: 10 },
                    direction: "top-left",
                    outModes: { default: "out" },
                    attract: { enable: true, rotate: { x: 600, y: 1200 } }
                }
            },
            retina_detect: true
        });
        // --- TAB TITLE ANIMATOR (Consistent Speed) ---
(function() {
    const tabWords = ["pulse"];
    let wordIdx = 0;
    let charIdx = 0;
    let isRev = false;
    const baseSpeed = 300; // Set both type and delete speed here (in ms)

    function updateTab() {
        const fullWord = tabWords[wordIdx];
        const prefix = "@";
        
        // Render the title
        document.title = prefix + fullWord.substring(0, charIdx);

        if (!isRev) {
            if (charIdx < fullWord.length) {
                charIdx++;
                setTimeout(updateTab, baseSpeed); 
            } else {
                isRev = true;
                setTimeout(updateTab, 2000); // Pause on full word
            }
        } else {
            if (charIdx > 0) {
                charIdx--;
                setTimeout(updateTab, baseSpeed); // Same speed as typing
            } else {
                isRev = false;
                wordIdx = (wordIdx + 1) % tabWords.length;
                setTimeout(updateTab, 500); // Small pause before next word
            }
        }
    }

    updateTab();
})();
    </script>
