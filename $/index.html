<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ogkush | wrk.money</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    
    <style>
        :root {
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 40px 0;
        }

        #enter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }

        #enter-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 1.5s ease;
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        header {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 25px 20px;
            backdrop-filter: blur(8px);
        }

        .pfp {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            object-fit: cover;
        }

        .name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.9;
        }

        .badge-container {
            position: relative;
            display: inline-block;
        }

        .badge-img {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .badge-img:hover { transform: scale(1.2); }

        .tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 2px;
            font-size: 0.6rem;
            white-space: nowrap;
            z-index: 10;
            text-transform: lowercase;
        }

        .badge-container:hover .tooltip { visibility: visible; }

        .typewriter-container {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            min-height: 1.5em;
            text-transform: lowercase;
            margin-top: 10px;
        }

        .audio-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px 20px;
            backdrop-filter: blur(8px);
            text-align: left;
        }

        .audio-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .track-name {
            font-size: 0.65rem;
            text-transform: lowercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.5;
            transition: opacity 0.3s;
            font-weight: bold;
        }

        .play-btn:hover { opacity: 1; }

        .volume-slider {
            -webkit-appearance: none;
            width: 50px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
        }

        .progress-container {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
        }

        .section-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.2);
            margin: 5px 0 10px 5px;
            text-align: left;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            text-transform: lowercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            outline: none;
        }

        .hub-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .console-footer {
            margin-top: 20px;
            font-size: 0.65rem;
            opacity: 0.25;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
        }

        #cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background: #fff;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        #copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 0.75rem;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            letter-spacing: 2px;
            text-transform: lowercase;
        }

        #copy-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="enter-overlay">
        <div class="enter-text">[ click to enter ]</div>
    </div>

    <div id="tsparticles"></div>

    <div class="container" id="main-content">
        <header>
            <img src="/wrk_files/giphy.gif" alt="ogkush" class="pfp">
            <div class="name-row">
                <h1>ogkush</h1>
                <div class="badge-container">
                    <a href="https://t.me/nft/ScaredCat-16534">
                        <img src="/wrk_files/scaredcat.gif" alt="Scared Cat" class="badge-img">
                    </a>
                    <span class="tooltip">Scared Cat #16534</span>
                </div>
            </div>
            <text>aka indicas, wrk, sleep, slept, & up4i</text>
            <div class="typewriter-container">
                <span id="typewriter"></span><span id="cursor"></span>
            </div>
        </header>

        <div class="audio-box">
            <div class="audio-info">
                <span class="track-name">We dont get along.</span>
                <div class="audio-controls">
                    <button class="play-btn" id="playBtn">I></button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.25">
                </div>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <audio id="audio" src="/wrk_files/we_dont_get_along.mp3" loop></audio>
        </div>

        <div class="nav-group">
            <span class="section-label">socials</span>
            <a href="https://t.me/ogkush" class="hub-btn">telegram</a>
            <a href="https://discord.com/users/577300949044035584" class="hub-btn">discord</a>
            <a href="https://instagram.com/up4i" class="hub-btn">instagram</a>
            <a href="https://steamcommunity.com/id/wrk999/" class="hub-btn">steam</a>
        </div>

        <div class="nav-group">
            <span class="section-label">payments</span>
            <button class="hub-btn" onclick="copyToClipboard('bc1qqfgr004dsutvl0hrj8qw5ndzed6c80zqrsmhjd')">BTC</button>
            <button class="hub-btn" onclick="copyToClipboard('0x63fC44372E64fd4b2E60935e2ac6a3858a80D841')">ETH</button>
            <button class="hub-btn" onclick="copyToClipboard('0x63fC44372E64fd4b2E60935e2ac6a3858a80D841')">USDT on ETH</button>
            <button class="hub-btn" onclick="copyToClipboard('UQCkkR5ovr_WMXrPLg1yCeSyhGV_wSrnTCL5E7ACa0DGtO6q')">TON</button>
        </div>

        <div class="console-footer">
            And to my beautiful wife, I'll love you forever.
        </div>
    </div>

    <div id="copy-toast">address copied</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
    
    <script>
        const audio = document.getElementById('audio');
        const overlay = document.getElementById('enter-overlay');
        const content = document.getElementById('main-content');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');

        audio.volume = 0.25;

        overlay.addEventListener('click', () => {
            overlay.classList.add('hidden');
            content.classList.add('visible');
            audio.play();
            playBtn.textContent = '||';
            setTimeout(type, 1000);
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); playBtn.textContent = '||'; }
            else { audio.pause(); playBtn.textContent = '|>'; }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${percent}%`;
        });

        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        });

        const phrases = ["Cybersecurity student", "@ogkush on telegram", "I love my beautiful wife!!!", "999 forever."];
        let pIdx = 0, cIdx = 0, isDeleting = false;
        const target = document.getElementById('typewriter');

        function type() {
            const current = phrases[pIdx];
            target.textContent = isDeleting ? current.substring(0, cIdx--) : current.substring(0, cIdx++);
            if (!isDeleting && cIdx > current.length) { isDeleting = true; setTimeout(type, 2000); }
            else if (isDeleting && cIdx < 0) { isDeleting = false; pIdx = (pIdx + 1) % phrases.length; cIdx = 0; setTimeout(type, 500); }
            else { setTimeout(type, isDeleting ? 40 : 80); }
        }

        // Network Background Config
        tsParticles.load("tsparticles", {
            fpsLimit: 120,
            particles: {
                number: { value: 80, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.3 },
                size: { value: { min: 1, max: 3 } },
                links: {
                    enable: true,
                    distance: 150,
                    color: "#ffffff",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1,
                    direction: "none",
                    outModes: { default: "out" }
                }
            },
            interactivity: {
                events: {
                    onHover: { enable: true, mode: "grab" },
                    onClick: { enable: true, mode: "push" }
                },
                modes: {
                    grab: { distance: 140, links: { opacity: 0.5 } },
                    push: { quantity: 4 }
                }
            },
            retina_detect: true
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copy-toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
    </script>
</body>
</html>
