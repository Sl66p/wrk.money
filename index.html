<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hub | wrk.money</title>
    <meta name="title" content="hub | wrk.money">
    <meta name="description" content="A directory for all of ogkush's sites.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wrk.money/">
    <meta property="og:title" content="hub | wrk.money">
    <meta property="og:description" content="A directory for all of ogkush's sites.">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://wrk.money/">
    <meta property="twitter:title" content="hub | wrk.money">
    <meta property="twitter:description" content="A directory for all of ogkush's sites.">
    <meta property="twitter:image" content="https://wrk.money/wrk_files/999circle.png">

    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    
    <style>
        :root {
            --accent: #ffffff; /* White to match the particles */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #0a0a0a; /* Dark background for the network effect */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        /* Particles container takes up the full background */
        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 1; /* Sits above the particles */
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.9;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px; /* Slightly sharper for the terminal vibe */
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            text-transform: lowercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .hub-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .console-footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            opacity: 0.25;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div class="container">
        <header>
            <h1>wrk.money</h1>
        </header>

        <nav class="nav-list">
            <a href="/$" class="hub-btn">ogkush's profile</a>
            <a href="/$$$" class="hub-btn">pulse's profile</a>
            <a href="/startpage" class="hub-btn">start page</a>
        </nav>
    </div>

    <div class="console-footer">
        NETWORK.ESTABLISHED // HUB_01
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
    
    <script>
        tsParticles.load("tsparticles", {
            particles: {
                number: { value: 80, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.3 },
                size: { value: { min: 1, max: 3 } },
                links: {
                    enable: true,
                    distance: 150,
                    color: "#ffffff",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1,
                    direction: "none",
                    outModes: { default: "out" }
                }
            },
            interactivity: {
                events: {
                    onHover: { enable: true, mode: "grab" },
                    onClick: { enable: true, mode: "push" }
                },
                modes: {
                    grab: { distance: 140, links: { opacity: 0.5 } },
                    push: { quantity: 4 }
                }
            },
            retina_detect: true
        });
    </script>
</body>
</html>
